async function callClaude(messages, systemPrompt) {
  const res = await fetch("/api/chat", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body:JSON.stringify({messages, systemPrompt}),
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error||"API error");
  return data.text;
}

async function speakElevenLabs(text, onEnd) {
  try {
    const res = await fetch("/api/speak", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({text}),
    });
    if (!res.ok) throw new Error("ElevenLabs failed");
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    audio.onended = () => { URL.revokeObjectURL(url); if (onEnd) onEnd(); };
    audio.onerror = () => { URL.revokeObjectURL(url); fallbackSpeak(text, onEnd); };
    await audio.play();
  } catch(e) {
    fallbackSpeak(text, onEnd);
  }
}

function fallbackSpeak(text, onEnd) {
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  const voices = window.speechSynthesis.getVoices();
  const preferred = voices.find(v=>v.lang==="en-US"&&v.localService)||voices.find(v=>v.lang==="en-US");
  if (preferred) utt.voice = preferred;
  utt.lang="en-US"; utt.rate=0.9; utt.pitch=1.0; utt.volume=1.0;
  if (onEnd) utt.onend = onEnd;
  window.speechSynthesis.speak(utt);
}

function buildSysPrompt(position, scenario) {
  return `You are simulating a real phone call at a legal staffing firm. This is a VOICE conversation.
ROLE: Act as ${position==="Paralegal"?"a supervising attorney":position==="Case Manager"?"a client, medical provider, or opposing counsel":"a caller or client"} for this scenario.
SCENARIO: ${scenario.desc}
INSTRUCTIONS: Keep ALL responses under 3 sentences. Speak naturally as if on a real phone call. No bullet points. Be conversational. Match the personality described. Reveal information gradually.
DO NOT break character or provide feedback.`;
}

function buildEvalPrompt(vaName, position, sessions) {
  const transcripts = sessions.map((s,i)=>`SCENARIO ${i+1}: ${s.scenario.label}\n${s.transcript}`).join("\n\n---\n\n");
  return `You are a senior legal staffing trainer evaluating a virtual assistant.
VA NAME: ${vaName} | POSITION: ${position} | SCENARIOS: ${sessions.length}
TRANSCRIPTS:\n${transcripts}
CRITERIA:\n${CRITERIA[position]}
OUTPUT FORMAT (use exactly this):
OVERALL SCORE: [X/10]
STRENGTHS:
• [point]
• [point]
WEAKNESSES:
• [point]
• [point]
MISSED OPPORTUNITIES:
• [item]
SUGGESTED IMPROVED RESPONSES:
• [example]
FINAL RECOMMENDATION:
[2-3 sentences of specific actionable coaching for ${vaName}]`;
}

function parseEval(text) {
  const score = text.match(/OVERALL SCORE:\s*([^\n]+)/)?.[1]?.trim();
  const section = (label) => {
    const re = new RegExp(`${label}:\\n([\\s\\S]*?)(?=\\n[A-Z ]+:|$)`);
    return text.match(re)?.[1]?.trim().split("\n").map(l=>l.replace(/^[•-]\s*/,"").trim()).filter(Boolean)||[];
  };
  const rec = text.match(/FINAL RECOMMENDATION:\n([\s\S]*?)$/)?.[1]?.trim();
  return {score, strengths:section("STRENGTHS"), weaknesses:section("WEAKNESSES"), missed:section("MISSED OPPORTUNITIES"), suggested:section("SUGGESTED IMPROVED RESPONSES"), rec};
}

              {title:"Strengths",items:e.strengths,color:"#16a34a"},
              {title:"Areas for Improvement",items:e.weaknesses,color:"#d97706"},
              {title:"Missed Opportunities",items:e.missed,color:"#ea580c"},
              {title:"Suggested Responses",items:e.suggested,color:"#9333ea"},
            ].map(({title,items,color})=>items?.length>0&&(
              <div key={title} style={card}>
                <h3 style={{margin:"0 0 12px",color,fontSize:14,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>{title}</h3>
                <ul style={{margin:0,padding:0,listStyle:"none",display:"flex",flexDirection:"column",gap:8}}>
                  {items.map((item,i)=><li key={i} style={{fontSize:14,color:"#374151",display:"flex",gap:8}}><span style={{color:"#d1d5db",flexShrink:0}}>—</span><span>{item}</span></li>)}
                </ul>
              </div>
            ))}
            {e.rec&&(
              <div style={card}>
                <h3 style={{margin:"0 0 10px",fontSize:14,color:"#111",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>Final Recommendation</h3>
                <p style={{margin:0,fontSize:14,color:"#374151",lineHeight:1.7,background:"#faf5ff",padding:"14px 16px",borderRadius:10}}>{e.rec}</p>
              </div>
            )}
            <button onClick={reset} style={{width:"100%",padding:16,fontSize:15,fontWeight:700,borderRadius:12,border:"none",color:"white",background:GRAD,cursor:"pointer"}}>
              Start New Session
            </button>
          </React.Fragment>
        )}

      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
