async function callClaude(messages, systemPrompt) {
  const res = await fetch("/api/chat", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({messages, systemPrompt}),
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error||"API error");
  return data.text;
}

function buildSysPrompt(position, scenario) {
  return `You are simulating a real virtual interaction at a legal staffing firm.
ROLE: Act as ${position==="Paralegal"?"a supervising attorney":position==="Case Manager"?"a client, medical provider, or opposing counsel as appropriate":"a caller or client"} for this scenario.
SCENARIO: ${scenario.desc}
INSTRUCTIONS:
- Open with a realistic first message that sets the scene
- Be natural and stay fully in character
- Reveal information gradually only when VA asks appropriate questions
- Match the personality described
- Keep responses to 2-4 sentences
DO NOT break character or provide feedback during the conversation.`;
}

function buildEvalPrompt(vaName, position, sessions) {
  const transcripts = sessions.map((s,i)=>`SCENARIO ${i+1}: ${s.scenario.label}\n${s.transcript}`).join("\n\n---\n\n");
  return `You are a senior legal staffing trainer evaluating a virtual assistant's performance across multiple training scenarios.
VA NAME: ${vaName}
POSITION: ${position}
SCENARIOS COMPLETED: ${sessions.length}
TRANSCRIPTS:\n${transcripts}
EVALUATION CRITERIA for ${position}:\n${CRITERIA[position]}
OUTPUT FORMAT (use exactly this):
OVERALL SCORE: [X/10]
STRENGTHS:
- [point]
- [point]
WEAKNESSES:
- [point]
- [point]
MISSED OPPORTUNITIES:
- [specific item]
SUGGESTED IMPROVED RESPONSES:
- [rewritten example]
FINAL RECOMMENDATION:
[2-3 sentences of specific actionable coaching for ${vaName}]`;
}

function parseEval(text) {
  const score = text.match(/OVERALL SCORE:\s*([^\n]+)/)?.[1]?.trim();
  const section = (label) => {
    const re = new RegExp(`${label}:\\n([\\s\\S]*?)(?=\\n[A-Z ]+:|$)`);
    return text.match(re)?.[1]?.trim().split("\n").map(l=>l.replace(/^[•\-]\s*/,"").trim()).filter(Boolean)||[];
  };
  const rec = text.match(/FINAL RECOMMENDATION:\n([\s\S]*?)$/)?.[1]?.trim();
  return {score, strengths:section("STRENGTHS"), weaknesses:section("WEAKNESSES"), missed:section("MISSED OPPORTUNITIES"), suggested:section("SUGGESTED IMPROVED RESPONSES"), rec};
}

function generatePDF(vaName, vaPosition, sessions, evaluationText) {
  const e = parseEval(evaluationText);
  const scoreNum = parseFloat(e.score);
  const date = new Date().toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"});
  const W=595,H=842,MG=50;
  const purple=[0.576,0.2,0.918];
  const lpurp=[0.98,0.97,1.0];
  const gray=[0.42,0.45,0.50];
  const dark=[0.07,0.07,0.07];
  const scoreC=scoreNum>=8?[0.086,0.639,0.29]:scoreNum>=5?[0.851,0.467,0.024]:[0.937,0.267,0.267];
  const r3=n=>n.toFixed(3);
  const norm=s=>String(s).normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^\x20-\x7E]/g,"?");
  const esc=s=>norm(s).replace(/\\/g,"\\\\").replace(/\(/g,"\\(").replace(/\)/g,"\\)");
  const wrap=(txt,pts,sz)=>{
    const mc=Math.floor(pts/(sz*0.52));
    const words=norm(txt).split(" ");
    const ls=[];let ln="";
    for(const w of words){if(ln&&(ln+" "+w).length>mc){ls.push(ln);ln=w;}else ln=ln?ln+" "+w:w;}
    if(ln)ls.push(ln);
    return ls.length?ls:[""];
  };
  const fR=([r,g,b],x,y,w,h)=>`${r3(r)} ${r3(g)} ${r3(b)} rg ${r3(x)} ${r3(y)} ${r3(w)} ${r3(h)} re f 0 0 0 rg\n`;
  const sR=([r,g,b],x,y,w,h,lw=0.5)=>`${r3(lw)} w ${r3(r)} ${r3(g)} ${r3(b)} RG ${r3(x)} ${r3(y)} ${r3(w)} ${r3(h)} re S 0 0 0 RG\n`;
  const ln2=([r,g,b],x1,y1,x2,y2,lw=0.5)=>`${r3(lw)} w ${r3(r)} ${r3(g)} ${r3(b)} RG ${r3(x1)} ${r3(y1)} m ${r3(x2)} ${r3(y2)} l S 0 0 0 RG\n`;
  const tx=(x,y,str,sz,bold,c=dark)=>`BT /${bold?"FB":"F"} ${sz} Tf ${r3(c[0])} ${r3(c[1])} ${r3(c[2])} rg 1 0 0 1 ${r3(x)} ${r3(y)} Tm (${esc(str)}) Tj ET\n`;
  const pages=[];let s="",cy=H-30;
  const np=()=>{pages.push(s);s="";cy=H-30;};
  const chk=n=>{if(cy-n<65)np();};
  s+=fR(purple,0,H-65,W,65);
  s+=tx(MG,H-32,"Legal Staff NOW",18,1,[1,1,1]);
  s+=tx(MG,H-48,"AI TRAINING SIMULATOR - PERFORMANCE REPORT",8,0,[0.85,0.85,1]);
  s+=tx(W-MG-130,H-32,date,8,0,[0.85,0.85,1]);
  s+=tx(W-MG-130,H-48,"CONFIDENTIAL",8,1,[0.85,0.85,1]);
  cy=H-82;
  s+=fR(lpurp,MG,cy-36,W-MG*2,42);
  s+=fR(purple,MG,cy-36,3,42);
  s+=tx(MG+10,cy-13,norm(vaName),15,1,dark);
  s+=tx(MG+10,cy-27,`${norm(vaPosition)}  |  ${date}`,9,0,gray);
  cy-=54;
  s+=sR([0.88,0.88,0.88],MG,cy-60,W-MG*2,66);
  s+=tx(W/2-62,cy-15,"OVERALL TRAINING SCORE",9,1,purple);
  s+=tx(W/2-50,cy-48,e.score||"-",30,1,scoreC);
  s+=tx(W/2-46,cy-59,`${sessions.length} scenarios completed`,9,0,gray);
  cy-=76;
  s+=tx(MG,cy,"Scenarios Completed",11,1,dark);
  s+=ln2(purple,MG,cy-4,W-MG,cy-4,0.8);
  cy-=16;
  sessions.forEach((sc,i)=>{
    const dl=wrap(sc.scenario.desc.split(".")[0]+".",W-MG*2-28,8);
    chk(14+dl.length*10);
    s+=tx(MG+5,cy,`${i+1}.  ${norm(sc.scenario.label)}`,9,1,dark);
    cy-=12;
    dl.forEach(l=>{s+=tx(MG+15,cy,l,8,0,gray);cy-=10;});
    cy-=4;
  });
  cy-=8;
  const sec=(title,items,col)=>{
    if(!items?.length)return;
    chk(22);
    s+=tx(MG,cy,title,11,1,col);
    s+=ln2(col,MG,cy-4,W-MG,cy-4,0.7);
    cy-=16;
    items.forEach(item=>{
      const ls=wrap(`- ${item}`,W-MG*2-14,9);
      chk(ls.length*11+6);
      ls.forEach(l=>{s+=tx(MG+8,cy,l,9,0,[0.15,0.2,0.25]);cy-=11;});
      cy-=3;
    });
    cy-=8;
  };
  sec("Strengths",e.strengths,[0.086,0.639,0.29]);
  sec("Areas for Improvement",e.weaknesses,[0.851,0.467,0.024]);
  sec("Missed Opportunities",e.missed,[0.918,0.345,0.047]);
  sec("Suggested Improved Responses",e.suggested,purple);
  if(e.rec){
    const rl=wrap(e.rec,W-MG*2-18,9);
    chk(rl.length*11+32);
    s+=tx(MG,cy,"Final Recommendation",11,1,dark);
    s+=ln2([0.85,0.85,0.85],MG,cy-4,W-MG,cy-4,0.5);
    cy-=14;
    s+=fR(lpurp,MG,cy-rl.length*11-6,W-MG*2,rl.length*11+12);
    rl.forEach(l=>{s+=tx(MG+8,cy,l,9,0,[0.15,0.2,0.25]);cy-=11;});
  }
  pages.push(s);
  const N=pages.length;
  const footer=pg=>tx(MG,32,"Legal Staff NOW  |  AI Training Simulator  |  Confidential",8,0,gray)+tx(W-MG-28,32,`Page ${pg} of ${N}`,8,0,gray);
  const F=1,FB=2,RES=3;
  const SIDS=Array.from({length:N},(_,i)=>4+i);
  const PGIDS=Array.from({length:N},(_,i)=>4+N+i);
  const PGSID=4+2*N,CATID=4+2*N+1,TOTAL=CATID+1;
  const objs={};
  objs[F]=`<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica /Encoding /WinAnsiEncoding >>`;
  objs[FB]=`<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold /Encoding /WinAnsiEncoding >>`;
  objs[RES]=`<< /Font << /F ${F} 0 R /FB ${FB} 0 R >> >>`;
  pages.forEach((ps,i)=>{
    const full=ps+footer(i+1);
    objs[SIDS[i]]=`<< /Length ${full.length} >>\nstream\n${full}\nendstream`;
    objs[PGIDS[i]]=`<< /Type /Page /MediaBox [0 0 ${W} ${H}] /Resources ${RES} 0 R /Contents ${SIDS[i]} 0 R /Parent ${PGSID} 0 R >>`;
  });
  objs[PGSID]=`<< /Type /Pages /Kids [${PGIDS.map(id=>`${id} 0 R`).join(" ")}] /Count ${N} >>`;
  objs[CATID]=`<< /Type /Catalog /Pages ${PGSID} 0 R >>`;
  let out="%PDF-1.4\n";
  const offs={};
  for(let i=1;i<TOTAL;i++){offs[i]=out.length;out+=`${i} 0 obj\n${objs[i]}\nendobj\n`;}
  const xp=out.length;
  out+=`xref\n0 ${TOTAL}\n0000000000 65535 f \n`;
  for(let i=1;i<TOTAL;i++)out+=`${String(offs[i]).padStart(10,"0")} 00000 n \n`;
  out+=`trailer\n<< /Size ${TOTAL} /Root ${CATID} 0 R >>\nstartxref\n${xp}\n%%EOF`;
  const blob=new Blob([new TextEncoder().encode(out)],{type:"application/pdf"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=`${norm(vaName).replace(/\s+/g,"_")}_Training_Report.pdf`;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

      <div style={{display:"flex",alignItems:"baseline"}}>
        <span style={{fontSize:28,fontWeight:900,fontStyle:"italic",color:"#111",fontFamily:"Georgia,serif"}}>Legal Staff&nbsp;</span>
        <span style={{fontSize:28,fontWeight:900,fontStyle:"italic",fontFamily:"Georgia,serif",background:GRAD,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>NOW</span>
      </div>
      <span style={{fontSize:10,fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase",color:"#9333ea"}}>AI Training Simulator</span>
    </div>
  );
}

function TypingIndicator() {
  return (
    <div style={{display:"flex",gap:4,padding:"12px 16px",background:"white",borderRadius:16,borderTopLeftRadius:4,border:"1px solid #e5e7eb",width:"fit-content"}}>
      {[0,150,300].map((d,i)=><span key={i} style={{width:8,height:8,borderRadius:"50%",background:"#9333ea",display:"block",animation:`bounce 0.8s ${d}ms infinite`}}/>)}
    </div>
  );
}

function App() {
  const [vaName,setVaName]=useState("");
  const [vaPosition,setVaPosition]=useState("");
  const [phase,setPhase]=useState("welcome");
  const [currentScenario,setCurrentScenario]=useState(null);
  const [completedSessions,setCompletedSessions]=useState([]);
  const [messages,setMessages]=useState([]);
  const [input,setInput]=useState("");
  const [aiLoading,setAiLoading]=useState(false);
  const [evaluation,setEvaluation]=useState(null);
  const chatEndRef=useRef(null);
  useEffect(()=>{chatEndRef.current?.scrollIntoView({behavior:"smooth"});},[messages,aiLoading]);
  const usedIds=completedSessions.map(s=>s.scenario.id);
  const available=vaPosition?(SCENARIOS[vaPosition]||[]).filter(s=>!usedIds.includes(s.id)):[];

  async function startScenario(sc){
    setCurrentScenario(sc);setMessages([]);setPhase("chat");setAiLoading(true);
    const text=await callClaude([{role:"user",content:"Begin the scenario. Send your opening message now."}],buildSysPrompt(vaPosition,sc));
    setMessages([{role:"ai",text}]);setAiLoading(false);
  }
  async function sendMessage(){
    const text=input.trim();if(!text||aiLoading)return;
    setInput("");
    const newMsgs=[...messages,{role:"user",text}];
    setMessages(newMsgs);setAiLoading(true);
    const apiMsgs=[
      {role:"user",content:"Begin the scenario. Send your opening message now."},
      ...newMsgs.flatMap((m,i)=>(i===0&&m.role==="ai")||m.role==="ai"?[{role:"assistant",content:m.text}]:[{role:"user",content:m.text}]),
    ];
    const aiText=await callClaude(apiMsgs,buildSysPrompt(vaPosition,currentScenario));
    setMessages([...newMsgs,{role:"ai",text:aiText}]);setAiLoading(false);
  }
  function endScenario(){
    const transcript=messages.map(m=>`${m.role==="user"?"VA":"SIMULATION"}: ${m.text}`).join("\n\n");
    setCompletedSessions(prev=>[...prev,{scenario:currentScenario,transcript}]);
    setCurrentScenario(null);setMessages([]);setPhase("dashboard");
  }
  async function getEvaluation(){
    setPhase("evaluating");
    const evalText=await callClaude([{role:"user",content:"Evaluate this VA training session."}],buildEvalPrompt(vaName,vaPosition,completedSessions));
    setEvaluation(evalText);setPhase("results");
  }
  function reset(){setVaName("");setVaPosition("");setPhase("welcome");setCurrentScenario(null);setCompletedSessions([]);setMessages([]);setInput("");setEvaluation(null);}

  const e=evaluation?parseEval(evaluation):null;
  const scoreNum=e?parseFloat(e.score):0;
  const scoreColor=scoreNum>=8?"#16a34a":scoreNum>=5?"#d97706":"#ef4444";

  return (
    <div style={{minHeight:"100vh",background:"#f0f0f0",fontFamily:"system-ui,sans-serif",display:"flex",flexDirection:"column"}}>
      <style>{`@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}} @keyframes spin{to{transform:rotate(360deg)}}`}</style>
      <header style={{background:"white",borderBottom:"1px solid #e5e7eb",padding:"14px 28px",display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
        <Logo/>
        {phase!=="welcome"&&(
          <div style={{display:"flex",alignItems:"center",gap:16}}>
            {vaName&&<span style={{fontSize:13,color:"#6b7280"}}>👤 <strong style={{color:"#111"}}>{vaName}</strong> · {vaPosition}</span>}
            <button onClick={reset} style={{fontSize:13,border:"1px solid #9333ea",color:"#9333ea",background:"none",padding:"6px 14px",borderRadius:8,cursor:"pointer",fontWeight:600}}>↺ New Session</button>
          </div>
        )}
      </header>
      <main style={{flex:1,maxWidth:760,width:"100%",margin:"0 auto",padding:"28px 16px",display:"flex",flexDirection:"column",gap:20}}>

        {phase==="welcome"&&(
          <div style={{...card,maxWidth:500,margin:"32px auto",width:"100%"}}>
            <h2 style={{margin:"0 0 6px",fontSize:22,fontWeight:800}}>Welcome to Training</h2>
            <p style={{margin:"0 0 24px",color:"#6b7280",fontSize:14}}>Enter your information to begin. You will complete {MIN_SCENARIOS}–{MAX_SCENARIOS} scenarios before receiving your full evaluation.</p>
            <label style={{display:"block",fontSize:13,fontWeight:600,color:"#374151",marginBottom:6}}>Full Name</label>
            <input value={vaName} onChange={ev=>setVaName(ev.target.value)} placeholder="e.g. Maria Gonzalez"
              style={{width:"100%",border:"1px solid #e5e7eb",borderRadius:10,padding:"12px 14px",fontSize:14,color:"#111",marginBottom:20,background:"white"}}/>
            <label style={{display:"block",fontSize:13,fontWeight:600,color:"#374151",marginBottom:10}}>Your Position</label>
            <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:28}}>
              {POSITIONS.map(p=>(
                <button key={p} onClick={()=>setVaPosition(p)}
                  style={{textAlign:"left",padding:"13px 16px",borderRadius:10,fontSize:14,fontWeight:500,cursor:"pointer",
                    ...(vaPosition===p?{background:GRAD,border:"none",color:"white"}:{background:"#f9f9f9",border:"1px solid #e5e7eb",color:"#374151"})}}>
                  {p}
                </button>
              ))}
            </div>
            <button onClick={()=>{if(vaName.trim()&&vaPosition)setPhase("dashboard");}}
              disabled={!vaName.trim()||!vaPosition}
              style={{width:"100%",padding:14,fontSize:16,fontWeight:700,borderRadius:12,border:"none",color:"white",background:GRAD,cursor:"pointer",opacity:!vaName.trim()||!vaPosition?0.4:1}}>
              Begin Training →
            </button>
          </div>
        )}

        {phase==="dashboard"&&(
          <>
            <div style={{...card,padding:"20px 24px"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12,marginBottom:16}}>
                <div>
                  <p style={{margin:0,fontSize:12,color:"#9333ea",textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:700}}>Session Progress</p>
                  <p style={{margin:"4px 0 0",fontSize:22,fontWeight:800,color:"#111"}}>{completedSessions.length} <span style={{fontSize:14,color:"#6b7280",fontWeight:400}}>of {MIN_SCENARIOS}–{MAX_SCENARIOS} scenarios</span></p>
                </div>
                <div style={{display:"flex",gap:8}}>
                  {Array.from({length:MAX_SCENARIOS}).map((_,i)=>(
                    <div key={i} style={{width:40,height:40,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:i<completedSessions.length?18:14,fontWeight:700,
                      background:i<completedSessions.length?GRAD:"white",color:i<completedSessions.length?"white":"#d1d5db",border:i<completedSessions.length?"none":"2px solid #e5e7eb"}}>
                      {i<completedSessions.length?"✓":i+1}
                    </div>
                  ))}
                </div>
              </div>
              {completedSessions.length>=MIN_SCENARIOS?(
                <div style={{borderTop:"1px solid #f0f0f0",paddingTop:16,display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
                  <button onClick={getEvaluation} style={{padding:"13px 20px",fontSize:14,fontWeight:700,borderRadius:10,border:"none",color:"white",background:GRAD,cursor:"pointer",flex:1,minWidth:200}}>
                    📊 Get My Full Evaluation
                  </button>
                  {completedSessions.length<MAX_SCENARIOS&&<span style={{fontSize:13,color:"#9ca3af"}}>or do one more scenario below</span>}
                </div>
              ):(
                <p style={{margin:0,fontSize:13,color:"#9ca3af",borderTop:"1px solid #f0f0f0",paddingTop:12}}>
                  Complete {MIN_SCENARIOS-completedSessions.length} more scenario{MIN_SCENARIOS-completedSessions.length>1?"s":""} to unlock your evaluation
                </p>
              )}
            </div>
            {completedSessions.length<MAX_SCENARIOS&&available.length>0&&(
              <div style={card}>
                <p style={{margin:"0 0 14px",fontWeight:700,fontSize:13,color:"#9333ea",textTransform:"uppercase",letterSpacing:"0.08em"}}>
                  {completedSessions.length===0?"Choose Your First Scenario":"Choose Next Scenario"}
                </p>
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {available.map(sc=>(
                    <button key={sc.id} onClick={()=>startScenario(sc)}
                      style={{textAlign:"left",padding:16,fontSize:14,background:"#f9f9f9",border:"1px solid #e5e7eb",borderRadius:12,cursor:"pointer",color:"#111"}}>
                      <div style={{fontWeight:700,marginBottom:4}}>{sc.label}</div>
                      <div style={{fontSize:13,color:"#6b7280"}}>{sc.desc}</div>
                    </button>
                  ))}
                </div>
              </div>
            )}
            {completedSessions.length>0&&(
              <div style={{...card,padding:"18px 24px"}}>
                <p style={{margin:"0 0 12px",fontWeight:700,fontSize:12,color:"#9ca3af",textTransform:"uppercase",letterSpacing:"0.08em"}}>Completed</p>
                {completedSessions.map((sc,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:i<completedSessions.length-1?"1px solid #f5f5f5":"none"}}>
                    <div style={{width:28,height:28,borderRadius:"50%",background:GRAD,color:"white",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,flexShrink:0}}>✓</div>
                    <span style={{fontSize:14,fontWeight:600,color:"#374151"}}>{sc.scenario.label}</span>
                  </div>
                ))}
              </div>
            )}
          </>
        )}

        {phase==="chat"&&(
          <>
            <div style={{...card,padding:"12px 18px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:12,fontWeight:700,padding:"4px 10px",borderRadius:999,background:GRAD,color:"white"}}>{vaPosition}</span>
                <span style={{fontSize:14,color:"#374151",fontWeight:500}}>{currentScenario?.label}</span>
              </div>
              <span style={{fontSize:12,color:"#9ca3af",fontWeight:500}}>Scenario {completedSessions.length+1} of {MAX_SCENARIOS}</span>
            </div>
            <div style={{background:"#f9f9f9",border:"1px solid #e5e7eb",borderRadius:20,padding:16,display:"flex",flexDirection:"column",gap:12,overflowY:"auto",minHeight:300,maxHeight:440}}>
              {messages.map((m,i)=>(
                <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
                  <div style={{maxWidth:"78%",padding:"12px 16px",borderRadius:18,fontSize:14,lineHeight:1.6,
                    ...(m.role==="user"?{background:GRAD,color:"white",borderTopRightRadius:4}:{background:"white",color:"#111",border:"1px solid #e5e7eb",borderTopLeftRadius:4})}}>
                    {m.role==="ai"&&<div style={{fontSize:11,fontWeight:700,color:"#9333ea",marginBottom:4,letterSpacing:"0.08em"}}>SIMULATION</div>}
                    {m.text}
                  </div>
                </div>
              ))}
              {aiLoading&&<TypingIndicator/>}
              <div ref={chatEndRef}/>
            </div>
            <div style={{display:"flex",gap:10}}>
              <input value={input} onChange={ev=>setInput(ev.target.value)} onKeyDown={ev=>ev.key==="Enter"&&sendMessage()}
                placeholder="Type your response..."
                style={{flex:1,background:"white",border:"1px solid #e5e7eb",borderRadius:12,padding:"13px 16px",fontSize:14,color:"#111"}}/>
              <button onClick={sendMessage} disabled={aiLoading||!input.trim()}
                style={{padding:"13px 20px",borderRadius:12,fontWeight:600,fontSize:14,border:"none",color:"white",background:GRAD,cursor:"pointer",opacity:aiLoading||!input.trim()?0.4:1}}>
                Send
              </button>
            </div>
            <button onClick={endScenario} style={{padding:13,borderRadius:12,border:"1px solid #d1fae5",color:"#16a34a",background:"#f0fdf4",fontSize:14,fontWeight:600,cursor:"pointer"}}>
              ✓ Complete This Scenario & Continue
            </button>
          </>
        )}

        {phase==="evaluating"&&(
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flex:1,gap:16,padding:"80px 0"}}>
            <div style={{width:52,height:52,borderRadius:"50%",border:"4px solid #e9d5ff",borderTopColor:"#9333ea",animation:"spin 1s linear infinite"}}/>
            <p style={{color:"#374151",fontSize:16,fontWeight:600}}>Analyzing {completedSessions.length} scenarios...</p>
            <p style={{color:"#9ca3af",fontSize:13}}>Generating full performance report for {vaName}</p>
          </div>
        )}

        {phase==="results"&&e&&(
          <>
            <div style={{...card,textAlign:"center"}}>
              <div style={{fontSize:11,fontWeight:700,color:"#9333ea",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.12em"}}>Overall Training Score</div>
              <div style={{fontSize:80,fontWeight:900,lineHeight:1,color:scoreColor}}>{e.score}</div>
              <div style={{fontSize:14,color:"#6b7280",marginTop:8}}>{vaName} · {vaPosition} · {completedSessions.length} scenarios</div>
            </div>
            <div style={card}>
              <p style={{margin:"0 0 12px",fontWeight:700,fontSize:12,color:"#6b7280",textTransform:"uppercase",letterSpacing:"0.08em"}}>Scenarios Evaluated</p>
              {completedSessions.map((sc,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:i<completedSessions.length-1?"1px solid #f5f5f5":"none"}}>
                  <div style={{width:26,height:26,borderRadius:"50%",background:GRAD,color:"white",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,flexShrink:0}}>{i+1}</div>
                  <span style={{fontSize:14,color:"#374151",fontWeight:500}}>{sc.scenario.label}</span>
                </div>
              ))}
            </div>
            {[
              {title:"✅ Strengths",items:e.strengths,color:"#16a34a"},
              {title:"⚠️ Areas for Improvement",items:e.weaknesses,color:"#d97706"},
              {title:"🎯 Missed Opportunities",items:e.missed,color:"#ea580c"},
              {title:"💡 Suggested Responses",items:e.suggested,color:"#9333ea"},
            ].map(({title,items,color})=>items?.length>0&&(
              <div key={title} style={card}>
                <h3 style={{margin:"0 0 12px",color,fontSize:15}}>{title}</h3>
                <ul style={{margin:0,padding:0,listStyle:"none",display:"flex",flexDirection:"column",gap:8}}>
                  {items.map((item,i)=>(
                    <li key={i} style={{fontSize:14,color:"#374151",display:"flex",gap:8}}>
                      <span style={{color:"#d1d5db",flexShrink:0}}>•</span><span>{item}</span>
                    </li>
                  ))}
                </ul>
              </div>
            ))}
            {e.rec&&(
              <div style={card}>
                <h3 style={{margin:"0 0 10px",fontSize:15,color:"#111"}}>📌 Final Recommendation</h3>
                <p style={{margin:0,fontSize:14,color:"#374151",lineHeight:1.7,background:"#faf5ff",padding:"14px 16px",borderRadius:10}}>{e.rec}</p>
              </div>
            )}
            <div style={{display:"flex",gap:12}}>
              <button onClick={()=>generatePDF(vaName,vaPosition,completedSessions,evaluation)}
                style={{flex:1,padding:16,fontSize:15,fontWeight:700,borderRadius:12,border:"none",color:"white",background:GRAD,cursor:"pointer"}}>
                ⬇ Download PDF Report
              </button>
              <button onClick={reset} style={{padding:16,fontSize:14,fontWeight:600,borderRadius:12,border:"1px solid #e5e7eb",color:"#374151",background:"white",cursor:"pointer"}}>
                New Session
              </button>
            </div>
          </>
        )}
      </main>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
